name: Build Wii U Homebrew

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wii U dependencies
        run: |
          sudo dkp-pacman -Syu --needed --noconfirm wiiu-dev
          # WUPS / Aroma tooling isn't included in wiiu-dev on all images.
          # If available as packages, install them; otherwise the Makefile will
          # still build the RPX and skip WPS packaging.
          sudo dkp-pacman -S --needed --noconfirm wiiu-wups wiiu-wupsloader wiiu-wups-tools || true

      - name: Compile
        run: |
          make clean
          make && make wps

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiiu-build
          path: |
            build/*.rpx
            build/*.wuhb
            build/*.wps
